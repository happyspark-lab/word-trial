<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【试玩】五年级语文：哪吒封神榜</title>
    <style>
        :root {
            --primary: #ff3300; --secondary: #ffcc00; --dark: #220a0a;
            --light: #fff5e6; --correct: #00e676; --wrong: #ff1744;
        }
        body {
            margin: 0; padding: 0; font-family: 'KaiTi', '楷体', serif;
            background-color: var(--dark);
            background-image: radial-gradient(circle at 50% 50%, rgba(255, 51, 0, 0.2) 0%, transparent 80%);
            color: var(--light); min-height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .game-card {
            background: rgba(30, 10, 10, 0.95); border: 5px solid var(--secondary); border-radius: 25px;
            padding: 30px; box-shadow: 0 0 50px rgba(255, 51, 0, 0.5); width: 95%; max-width: 750px; text-align: center;
            /* 增加盒模型设置，防止padding撑大宽度 */
            box-sizing: border-box; 
        }
        .header { display: flex; justify-content: space-between; font-size: 1.2rem; color: var(--secondary); margin-bottom: 10px; }
        .progress-track { width: 100%; height: 14px; background: #441111; border-radius: 7px; margin-bottom: 25px; overflow: hidden; border: 1px solid var(--primary); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ffcc00, #ff3300); width: 0%; transition: width 0.3s; }
        .q-badge { background: var(--primary); display: inline-block; padding: 6px 16px; border-radius: 12px; font-size: 1.1rem; margin-bottom: 15px; color: white; font-weight: bold;}
        
        .q-phrase-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin: 25px 0; }
        .q-instruction { font-size: 1.6rem; color: #aaa; } 
        /* 核心优化：高亮字样式 */
        .q-phrase { font-size: 4rem; color: var(--light); text-shadow: 0 0 20px var(--primary); white-space: nowrap; letter-spacing: 5px; }
        .highlight-y { color: #ffcc00; font-weight: bold; font-size: 1.1em; border-bottom: 4px solid #ffcc00; padding-bottom: 5px; text-shadow: 0 0 10px #ff9900; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .option-btn {
            background: rgba(255,255,255,0.05); border: 2px solid #662222; color: var(--light);
            padding: 20px; font-size: 2.2rem; border-radius: 18px; cursor: pointer; transition: 0.2s;
        }
        .option-btn:hover { border-color: var(--secondary); background: rgba(255, 204, 0, 0.1); }
        .option-btn.correct { background: var(--correct) !important; color: #000; font-weight: bold; }
        .option-btn.wrong { background: var(--wrong) !important; }
        
        .feedback-box { display: none; margin-top: 25px; padding: 20px; border: 2px dashed var(--secondary); background: rgba(0,0,0,0.6); text-align: left; }
        .fb-title { font-size: 2rem; font-weight: bold; display: block; margin-bottom: 10px; }
        .fb-text { font-size: 1.6rem; line-height: 1.5; color: #fff; }
        
        .wrong-list { text-align: left; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-top: 20px; max-height: 200px; overflow-y: auto; font-size: 1.2rem; }
        .wrong-item { color: #ff6b6b; margin-bottom: 8px; border-bottom: 1px solid #444; padding-bottom: 4px; }
        
        /* 营销专用按钮样式 */
        .action-btn { background: var(--secondary); color: #331111; border: none; padding: 18px 50px; font-size: 1.8rem; border-radius: 40px; cursor: pointer; font-weight: bold; margin-top: 25px; box-shadow: 0 5px 0 #b8860b; }
        .action-btn:active { transform: translateY(4px); box-shadow: none; }
        .buy-btn { background: linear-gradient(45deg, #ff0055, #ff3300); color: white; box-shadow: 0 5px 0 #990033; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* ========================================= */
        /* 👇 手机端适配代码 (屏幕小于600px时生效) 👇 */
        /* ========================================= */
        @media screen and (max-width: 600px) {
            /* 1. 缩小容器边距，腾出空间 */
            .game-card { padding: 15px 15px; border-width: 3px; border-radius: 15px; width: 92%; }
            
            /* 2. 强制缩小标题字号 (使用!important覆盖内联样式) */
            h1[style] { font-size: 2.2rem !important; margin-top: 0; }
            
            /* 3. 缩小题目核心大字 */
            .q-phrase { font-size: 2.5rem; letter-spacing: 2px; }
            .q-phrase-container { margin: 15px 0; gap: 5px; }
            .q-instruction { font-size: 1.2rem; }

            /* 4. 调整选项按钮大小 */
            .options-grid { gap: 10px; }
            .option-btn { padding: 15px 5px; font-size: 1.6rem; border-radius: 12px; }

            /* 5. 调整营销按钮和正文 */
            .action-btn { padding: 15px 30px !important; font-size: 1.4rem !important; width: 100%; box-sizing: border-box; }
            .feedback-box { padding: 15px; margin-top: 15px; }
            .fb-title { font-size: 1.4rem; }
            .fb-text { font-size: 1.2rem; }
            
            /* 6. 首页文字调整 */
            #start-screen div[style*="font-size: 1.4rem"] {
                font-size: 1.1rem !important;
                padding: 15px !important;
            }
        }
    </style>
</head>
<body>
    <div id="game-container" class="game-card">
        <div id="start-screen">
            <h1 style="font-size: 4rem; color: var(--secondary); margin-bottom: 5px; text-shadow: 2px 2px 5px #000;">🔥 哪吒降魔 🔥</h1>
            <div style="background:var(--primary); color:white; display:inline-block; padding:5px 15px; border-radius:10px; font-size:1.2rem; margin-bottom:20px;">✨ 10题精华试玩版 ✨</div>
            
            <div style="margin: 20px auto; max-width: 600px; font-size: 1.4rem; text-align: left; background: rgba(255,255,255,0.05); padding: 25px; border-radius: 18px; border: 1px solid rgba(255,204,0,0.3); line-height: 1.8;">
                <p>👋 <b>家长您好！</b>这是专为五年级孩子打造的趣味纠错特训。</p >
                <p>📅 <b>科学计划</b>：每天只需练习 2 次，<b>一周即可掌握</b>五年级上册 <b>130道</b> 核心易错题。</p >
                <p>😄 <b>寓教于乐</b>：让孩子在游戏中<b>轻松搞定错别字</b>，告别枯燥抄写！</p >
                <p style="border-top: 1px dashed rgba(255,255,255,0.2); margin-top:15px; padding-top:10px; color:#ccc; font-size:1.2rem;">⬇️ <b>试玩内容</b>：本关精选 10 道高频错题，邀您体验。</p >
            </div>
            
            <button class="action-btn" style="font-size: 2rem; padding: 20px 60px; animation: pulse 2s infinite;" onclick="startGame()">开始免费试玩</button>
        </div>

        <div id="game-screen" style="display: none;">
            <div class="header"><span id="score-display">功德点: 0</span><span id="count-display">进度: 1/10</span></div>
            <div class="progress-track"><div class="progress-fill" id="progress-bar"></div></div>
            <div id="q-type" class="q-badge"></div>
            <div class="q-phrase-container" id="q-main-display"></div>
            <div class="options-grid" id="options-grid"></div>
            <div class="feedback-box" id="feedback-box"><span id="fb-title" class="fb-title"></span><p id="fb-text" class="fb-text"></p ></div>
            <button id="next-btn" class="action-btn" style="display:none" onclick="nextQuestion()">斩下个妖孽 ➔</button>
        </div>

        <div id="result-screen" style="display: none;">
            <h1 style="font-size: 3.5rem; color: var(--secondary);">体验结束！</h1>
            <p style="font-size: 1.5rem; margin-bottom: 20px;">您的孩子刚才表现非常棒！<br>本次得分：<span id="final-score" style="color:var(--correct); font-weight:bold; font-size:2rem;">0</span></p >
            
            <div id="wrong-record-box" style="margin-bottom:25px;">
                <p style="text-align:left; color:var(--secondary); font-size: 1.2rem;">📜 体验版错题预览：</p >
                <div class="wrong-list" id="wrong-list"></div>
            </div>

            <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; border: 2px solid var(--primary);">
                <p style="font-size: 1.4rem; color: #fff; margin-bottom: 15px;">想让孩子一周攻克 <b>130+</b> 核心考点吗？</p >
                <button class="action-btn buy-btn" onclick="alert('此处可链接到您的微店/付款码页面')">👉 立即解锁完整版</button>
                <p style="color: #ccc; font-size: 1rem; margin-top: 10px;">包含：全量题库 | 永久使用 | 智能错题本</p >
            </div>
            
            <button style="background:transparent; border:none; color:#888; margin-top:15px; cursor:pointer; text-decoration:underline; font-size: 1.2rem;" onclick="location.reload()">重新试玩本关</button>
        </div>
    </div>

<script>
    // --- 音效初始化 (使用安全包裹) ---
    // 这样写是为了防止在不支持音频的浏览器中报错导致脚本停止
    let AudioCtx = null;
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext) {
            AudioCtx = new AudioContext();
        }
    } catch(e) {
        console.log("Audio not supported");
    }

    function playSound(freq, type, duration) {
        if (!AudioCtx) return;
        try {
            const osc = AudioCtx.createOscillator();
            const gain = AudioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, AudioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, AudioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(AudioCtx.destination);
            osc.start(); osc.stop(AudioCtx.currentTime + duration);
        } catch(e) {}
    }

    // --- 黄金10题 (固定题库) ---
    const DB = [
        { t:"正音试炼", inst:"选出高亮字的读音", phrase:"白<span class='highlight-y'>鹭</span>", opts:["lù", "lòu"], ans:"lù", why:"鹭(lù)鸟，不读lòu。" },
        { t:"正音试炼", inst:"选出高亮字的读音", phrase:"<span class='highlight-y'>渲</span>染", opts:["xuàn", "xuān"], ans:"xuàn", why:"渲染(xuàn)是四声。" },
        { t:"正音试炼", inst:"选出高亮字的读音", phrase:"倔<span class='highlight-y'>强</span>", opts:["jiàng", "qiáng"], ans:"jiàng", why:"强(jiàng)不读qiáng。" },
        { t:"多音迷阵", inst:"选出高亮字的读音", phrase:"淹<span class='highlight-y'>没</span>农田", opts:["mò", "méi"], ans:"mò", why:"没有读méi；沉没读mò。" },
        { t:"多音迷阵", inst:"选出高亮字的读音", phrase:"土地<span class='highlight-y'>龟</span>裂", opts:["jūn", "guī"], ans:"jūn", why:"乌龟读guī；裂开读jūn。" },
        { t:"多音迷阵", inst:"选出高亮字的读音", phrase:"勇夺<span class='highlight-y'>冠</span>军", opts:["guàn", "guān"], ans:"guàn", why:"桂冠读guān；第一名读guàn。" },
        { t:"多音迷阵", inst:"选出高亮字的读音", phrase:"<span class='highlight-y'>鲜</span>为人知", opts:["xiǎn", "xiān"], ans:"xiǎn", why:"新鲜读xiān；少见读xiǎn。" },
        { t:"火眼金睛", inst:"看拼音选汉字", phrase:"yǎn jiǎn", opts:["眼睑", "眼脸"], ans:"眼睑", why:"‘睑’右边是‘佥’，不是‘脸’。" },
        { t:"火眼金睛", inst:"看拼音选汉字", phrase:"zhàng péng", opts:["帐篷", "账篷"], ans:"帐篷", why:"帐篷用巾字旁，账本用贝字旁。" },
        { t:"火眼金睛", inst:"成语补全", phrase:"再接再__", opts:["厉", "励"], ans:"厉", why:"厉指磨刀石，厉兵秣马。" }
    ];

    let currentPool = []; let idx = 0; let score = 0; let wrongRecords = [];

    function startGame() {
        // 核心修复：优先执行界面切换，绝对保证点击有反应
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';

        // 尝试恢复音效（即使失败也不影响界面）
        if (AudioCtx && AudioCtx.state === 'suspended') {
            AudioCtx.resume().catch(e => console.log("Audio resume skipped"));
        }
        
        currentPool = [...DB]; // 使用固定10题
        idx = 0; score = 0; wrongRecords = [];
        showQuestion();
    }

    function showQuestion() {
        const q = currentPool[idx];
        document.getElementById('count-display').innerText = `进度: ${idx + 1}/10`;
        document.getElementById('progress-bar').style.width = `${((idx+1) / 10) * 100}%`;
        document.getElementById('score-display').innerText = `功德点: ${score}`;
        document.getElementById('q-type').innerText = q.t;
        
        document.getElementById('q-main-display').innerHTML = `
            <div class="q-instruction">${q.inst}：</div>
            <div class="q-phrase">${q.phrase}</div>
        `;
        
        const grid = document.getElementById('options-grid'); grid.innerHTML = '';
        let opts = [...q.opts].sort(() => Math.random() - 0.5);
        opts.forEach(opt => {
            const btn = document.createElement('button'); btn.className = 'option-btn';
            btn.innerText = opt; btn.onclick = () => { playSound(600, 'sine', 0.1); check(btn, opt, q); };
            grid.appendChild(btn);
        });
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function check(btn, val, q) {
        document.querySelectorAll('.option-btn').forEach(b => b.onclick = null);
        const isCorrect = val === q.ans;
        if (isCorrect) {
            playSound(880, 'triangle', 0.3);
            btn.classList.add('correct'); score += 10; // 试玩版每题10分，总分100
            document.getElementById('fb-title').innerText = "✅ 回答正确！";
            document.getElementById('fb-title').style.color = "var(--correct)";
        } else {
            playSound(150, 'sawtooth', 0.4);
            btn.classList.add('wrong');
            // 去除高亮标签，仅显示纯文本供记录
            const pureText = q.phrase.replace(/<[^>]+>/g, '');
            wrongRecords.push({ phrase: pureText, ans: q.ans });
            document.getElementById('fb-title').innerText = "❌ 正确答案是：";
            document.getElementById('fb-title').style.color = "var(--wrong)";
            document.querySelectorAll('.option-btn').forEach(b => { if(b.innerText === q.ans) b.classList.add('correct'); });
        }
        document.getElementById('fb-text').innerText = q.why;
        document.getElementById('feedback-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        idx++;
        if (idx < currentPool.length) showQuestion();
        else showResult();
    }

    function showResult() {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = score;
        const list = document.getElementById('wrong-list');
        if (wrongRecords.length === 0) {
            list.innerHTML = "<p style='color:var(--correct)'>太棒了！10道题全部正确！您的孩子基础非常扎实。</p >";
        } else {
            list.innerHTML = wrongRecords.map(r => `<div class="wrong-item">${r.phrase} 👉 正确：${r.ans}</div>`).join('');
        }
    }
</script>
</body>
</html>
